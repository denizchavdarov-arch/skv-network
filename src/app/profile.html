<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — SKV Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; }
        .nav { display: flex; gap: 24px; padding: 16px 24px; border-bottom: 1px solid #21262d; }
        .nav a { color: #8b949e; text-decoration: none; font-size: 14px; }
        .nav a:hover { color: #c9d1d9; }
        .nav a.active { color: #f78166; }
        .main { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
        h1 { font-size: 28px; font-weight: 600; color: #f0883e; margin-bottom: 16px; }
        .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
        .card h2 { font-size: 16px; color: #c9d1d9; margin-bottom: 12px; }
        label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; }
        input { width: 100%; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; margin-bottom: 12px; }
        input:focus { outline: none; border-color: #f78166; }
        button { padding: 8px 20px; background: #238636; color: #fff; border: 1px solid #2ea043; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #2ea043; }
        .msg { font-size: 13px; padding: 8px 12px; border-radius: 6px; margin-top: 10px; display: none; }
        .msg.success { background: #1b3a1b; color: #3fb950; display: block; }
        .msg.error { background: #3a1b1b; color: #f85149; display: block; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/upload">Upload</a>
        <a href="/trials">Trials</a>
        <a href="/profile">Profile</a>
        <a href="/.well-known/skv" target="_blank">Discovery</a>
        <a href="/about">About</a>
    </div>
    <div class="main">
        <h1>SKV Profile</h1>

        <div class="card">
            <h2>Register / Login</h2>
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters">
            <div style="display:flex;gap:10px;">
                <button onclick="register()">Register</button>
                <button onclick="login()">Login</button>
            </div>
            <div class="msg" id="authMsg"></div>
        </div>

        <div class="card" id="confirmCard" style="display:none;">
            <h2>Confirm Email</h2>
            <label>Confirmation Code</label>
            <input type="text" id="confirmCode" placeholder="Enter code from email">
            <button onclick="confirmEmail()">Confirm</button>
            <div class="msg" id="confirmMsg"></div>
        </div>

        <div class="card" id="tokenCard" style="display:none;">
            <h2>Your API Token</h2>
            <p style="font-size:13px;color:#8b949e;margin-bottom:8px;">Use this token to authenticate API requests.</p>
            <code id="tokenDisplay" style="background:#0d1117;padding:8px 12px;border-radius:4px;color:#7ee787;word-break:break-all;font-size:12px;"></code>
        </div>
    </div>

    <script>
        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showMsg('authMsg', 'error', 'Fill all fields'); return; }
            showMsg('authMsg', 'success', 'Registering...');
            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({email, password})
                });
                const d = await r.json();
                if (r.ok) {
                    showMsg('authMsg', 'success', d.message + '. Check email for code.');
                    document.getElementById('confirmCard').style.display = 'block';
                } else {
                    showMsg('authMsg', 'error', d.detail || 'Error');
                }
            } catch(e) { showMsg('authMsg', 'error', 'Network error'); }
        }

        async function confirmEmail() {
            const email = document.getElementById('email').value.trim();
            const code = document.getElementById('confirmCode').value.trim();
            if (!code) { showMsg('confirmMsg', 'error', 'Enter code'); return; }
            try {
                const r = await fetch('/api/auth/confirm', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({email, code})
                });
                const d = await r.json();
                if (r.ok) {
                    showMsg('confirmMsg', 'success', 'Email confirmed!');
                    document.getElementById('confirmCard').style.display = 'none';
                } else {
                    showMsg('confirmMsg', 'error', d.detail || 'Error');
                }
            } catch(e) { showMsg('confirmMsg', 'error', 'Network error'); }
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showMsg('authMsg', 'error', 'Fill all fields'); return; }
            showMsg('authMsg', 'success', 'Logging in...');
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({email, password})
                });
                const d = await r.json();
                if (r.ok) {
                    showMsg('authMsg', 'success', 'Logged in!');
                    document.getElementById('tokenCard').style.display = 'block';
                    document.getElementById('tokenDisplay').textContent = d.token;
                } else {
                    showMsg('authMsg', 'error', d.detail || 'Error');
                }
            } catch(e) { showMsg('authMsg', 'error', 'Network error'); }
        }

        function showMsg(id, type, text) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg ' + type;
        }
    </script>
</body>
</html>
