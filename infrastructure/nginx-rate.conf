# Rate limiting zones
limit_req_zone $binary_remote_addr zone=consult:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=tools:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=entries:10m rate=10r/m;

server {
    listen 80;
    server_name skv.network;

    charset utf-8;

    # Статические файлы (изображения, HTML, PDF)
    location /downloads/ {
        alias /root/skv-core/src/app/downloads/;
        add_header Cache-Control "public, max-age=3600";
    }

    location /api/consult {
        limit_req zone=consult burst=10 nodelay;
        proxy_pass http://skv_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/execute {
        proxy_pass http://skv_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tools/generate {
        limit_req zone=tools burst=2 nodelay;
        proxy_pass http://skv_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/entries {
        limit_req zone=entries burst=5 nodelay;
        proxy_pass http://skv_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v2/entries {
        limit_req zone=entries burst=5 nodelay;
        proxy_pass http://skv_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://skv_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
